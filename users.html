<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SAM HQ - Users</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#09080F;--surface:rgba(255,255,255,.04);--surface2:rgba(255,255,255,.07);--border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.14);--text:#F0ECFF;--text2:rgba(240,236,255,.6);--text3:rgba(240,236,255,.35);--spark:#A78BFA;--pulse:#F472B6;--green:#34D399}
html,body{height:100%}
body{font-family:"Sora",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
.amb{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0}
.amb1{width:600px;height:600px;background:#A78BFA;top:-200px;left:-100px;opacity:.08}
.amb2{width:400px;height:400px;background:#F472B6;bottom:-100px;right:-80px;opacity:.06}
.page{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:40px 24px 80px}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:40px}
.header-left{display:flex;align-items:center;gap:16px}
.back-btn{display:inline-flex;align-items:center;gap:6px;color:var(--text3);font-size:13px;text-decoration:none;border:1px solid var(--border);border-radius:8px;padding:6px 12px;transition:all .2s}
.back-btn:hover{color:var(--text);border-color:var(--border2)}
.page-title{font-size:28px;font-weight:800}
.page-title span{color:var(--spark)}
.stats-row{display:flex;gap:12px}
.stat-pill{font-size:12px;font-weight:600;padding:5px 14px;border-radius:999px;border:1px solid var(--border2);color:var(--text2);background:var(--surface)}
.stat-pill.green{border-color:rgba(52,211,153,.3);color:var(--green);background:rgba(52,211,153,.08)}
.controls{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap}
.search-wrap{flex:1;min-width:200px;position:relative}
.search-input{width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:10px 16px 10px 38px;font-family:"Sora",sans-serif;font-size:14px;color:var(--text);outline:none;transition:all .2s}
.search-input:focus{border-color:rgba(167,139,250,.5);background:var(--surface2)}
.search-input::placeholder{color:var(--text3)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:16px}
.filter-btn{background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:10px 16px;font-family:"Sora",sans-serif;font-size:13px;color:var(--text2);cursor:pointer;transition:all .2s}
.filter-btn:hover,.filter-btn.active{border-color:rgba(167,139,250,.5);color:var(--spark)}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.table-head{display:grid;grid-template-columns:2fr 2fr 1fr 1fr 1.5fr 1.5fr;padding:12px 20px;border-bottom:1px solid var(--border);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3)}
.user-row{display:grid;grid-template-columns:2fr 2fr 1fr 1fr 1.5fr 1.5fr;padding:14px 20px;border-bottom:1px solid var(--border);align-items:center;transition:background .15s;animation:fadeIn .4s ease forwards;opacity:0}
.user-row:last-child{border-bottom:none}
.user-row:hover{background:var(--surface2)}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.user-name{font-size:14px;font-weight:600}
.user-email{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tier-badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700}
.tier-free{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:var(--text3)}
.tier-pro{background:rgba(167,139,250,.12);border:1px solid rgba(167,139,250,.3);color:var(--spark)}
.source-tag{font-size:11px;color:var(--text3);font-family:"JetBrains Mono",monospace}
.date-tag{font-size:12px;color:var(--text3)}
.actions{display:flex;gap:8px}
.action-btn{font-size:11px;font-weight:600;padding:5px 12px;border-radius:6px;border:1px solid var(--border2);background:none;color:var(--text2);cursor:pointer;font-family:"Sora",sans-serif;transition:all .2s;white-space:nowrap}
.action-btn.primary{border-color:rgba(167,139,250,.4);color:var(--spark);background:rgba(167,139,250,.08)}
.action-btn.primary:hover{background:rgba(167,139,250,.15)}
.action-btn:hover{color:var(--text);background:var(--surface2)}
.modal-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(9,8,15,.85);backdrop-filter:blur(16px);align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:#0D0B16;border:1px solid rgba(167,139,250,.2);border-radius:20px;padding:32px;width:100%;max-width:560px;position:relative;animation:slideUp .3s cubic-bezier(.34,1.2,.64,1)}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.modal-close{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer}
.modal-title{font-size:18px;font-weight:700;margin-bottom:4px}
.modal-sub{font-size:13px;color:var(--text2);margin-bottom:20px}
.modal-user-card{background:rgba(167,139,250,.06);border:1px solid rgba(167,139,250,.15);border-radius:12px;padding:14px 16px;margin-bottom:20px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.modal-user-label{font-size:11px;color:var(--text3);margin-bottom:2px}
.modal-user-val{font-size:13px;font-weight:600}
.prompt-label{font-size:12px;color:var(--text3);margin-bottom:8px;font-weight:600;letter-spacing:.05em;text-transform:uppercase}
.prompt-select{width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:10px 14px;font-family:"Sora",sans-serif;font-size:13px;color:var(--text);outline:none;margin-bottom:16px;cursor:pointer}
.email-output{width:100%;min-height:160px;background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:14px;font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--text2);resize:vertical;outline:none;line-height:1.7}
.modal-actions{display:flex;gap:10px;margin-top:16px}
.modal-btn{flex:1;padding:12px;border:none;border-radius:10px;font-family:"Sora",sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s}
.modal-btn.generate{background:linear-gradient(135deg,#6D28D9,#A78BFA 50%,#F472B6);color:#fff;box-shadow:0 0 24px rgba(167,139,250,.3)}
.modal-btn.copy{background:var(--surface);border:1px solid var(--border2);color:var(--text2)}
.modal-btn:disabled{opacity:.5;cursor:not-allowed}
.generating-dots::after{content:"";animation:dots 1s infinite}
@keyframes dots{0%{content:"."}33%{content:".."}66%{content:"..."}}
.empty{text-align:center;padding:60px 20px;color:var(--text3)}
.loading{text-align:center;padding:60px;color:var(--text3);font-size:14px}
</style>
</head>
<body>
<div class="amb amb1"></div><div class="amb amb2"></div>
<div class="page">
<div class="header">
<div class="header-left">
<a href="https://sam-hq.vercel.app" class="back-btn">Back to SAM HQ</a>
<div class="page-title">Users <span>+</span></div>
</div>
<div class="stats-row">
<div class="stat-pill green" id="totalStat">Loading...</div>
<div class="stat-pill" id="todayStat">Today: -</div>
<div class="stat-pill" id="paidStat">Paid: -</div>
</div>
</div>
<div class="controls">
<div class="search-wrap"><span class="search-icon">+</span><input class="search-input" id="searchInput" placeholder="Search name or email..." oninput="filterUsers()"/></div>
<button class="filter-btn active" onclick="setFilter('all',this)">All</button>
<button class="filter-btn" onclick="setFilter('free',this)">Free</button>
<button class="filter-btn" onclick="setFilter('pro',this)">Pro</button>
<button class="filter-btn" onclick="setFilter('paid',this)">Paid</button>
<button class="filter-btn" onclick="loadUsers()" style="margin-left:auto">Refresh</button>
</div>
<div class="table-wrap">
<div class="table-head"><div>Name</div><div>Email</div><div>Tier</div><div>Source</div><div>Signed Up</div><div>Actions</div></div>
<div id="userList"><div class="loading">Loading users...</div></div>
</div>
</div>
<div class="modal-overlay" id="emailModal">
<div class="modal">
<button class="modal-close" onclick="closeModal()">X</button>
<div class="modal-title">Draft Follow-Up with SAM</div>
<div class="modal-sub" id="modalSub"></div>
<div class="modal-user-card" id="modalUserCard"></div>
<div class="prompt-label">Email Type</div>
<select class="prompt-select" id="emailType">
<option value="checkin">48-hour check-in</option>
<option value="trial_ending">Trial ending soon</option>
<option value="upgrade">Upgrade to Pro</option>
<option value="winback">Win-back</option>
<option value="voicedna">Voice DNA intro</option>
<option value="custom">Custom</option>
</select>
<div class="prompt-label">Generated Email</div>
<textarea class="email-output" id="emailOutput" placeholder="Click Generate to create a personalized email..."></textarea>
<div class="modal-actions">
<button class="modal-btn generate" id="generateBtn" onclick="generateEmail()">Generate with SAM</button>
<button class="modal-btn copy" id="copyBtn" onclick="copyEmail()">Copy</button>
<button class="modal-btn generate" id="sendBtn" onclick="sendEmail()" style="background:linear-gradient(135deg,#065f46,#34d399);box-shadow:0 0 24px rgba(52,211,153,.3)">Send to User</button>
</div>
</div>
</div>
<script>
let allUsers=[],currentFilter="all",selectedUser=null;
async function loadUsers(){
document.getElementById("userList").innerHTML='<div class="loading">Loading users...</div>';
try{
const r=await fetch("https://samforcreators.com/api/all-users");
const data=await r.json();
allUsers=data.users||[];
const paid=allUsers.filter(u=>u.paid).length;
const today=allUsers.filter(u=>u.signedUpAt&&u.signedUpAt.startsWith(new Date().toISOString().split("T")[0])).length;
document.getElementById("totalStat").textContent=allUsers.length+" users";
document.getElementById("todayStat").textContent="Today: "+today;
document.getElementById("paidStat").textContent="Paid: "+paid;
renderUsers(allUsers);
}catch(e){
document.getElementById("userList").innerHTML='<div class="empty"><div>Failed: '+e.message+'</div></div>';
}
}
function renderUsers(users){
if(!users.length){document.getElementById("userList").innerHTML='<div class="empty">No users found</div>';return;}
document.getElementById("userList").innerHTML=users.map((u,i)=>'<div class="user-row" style="animation-delay:'+( i*30)+'ms"><div class="user-name">'+esc(u.name||"-")+'</div><div class="user-email" title="'+esc(u.email)+'">'+esc(u.email)+'</div><div><span class="tier-badge tier-'+(u.tier||"free")+'">'+( u.tier||"free")+'</span></div><div class="source-tag">'+( u.source||"-")+'</div><div class="date-tag">'+fmt(u.signedUpAt)+'</div><div class="actions"><button class="action-btn primary" onclick="openModal('+ i+')">Follow-up</button><button class="action-btn" onclick="copyAddr(\''+esc(u.email)+'\')">Copy</button></div></div>').join("");
}
function setFilter(f,btn){currentFilter=f;document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));btn.classList.add("active");filterUsers();}
function getFiltered(){const q=document.getElementById("searchInput").value.toLowerCase();let f=allUsers;if(currentFilter==="free")f=f.filter(u=>!u.paid&&u.tier==="free");if(currentFilter==="pro")f=f.filter(u=>u.tier==="pro"||u.tier==="creator");if(currentFilter==="paid")f=f.filter(u=>u.paid);if(q)f=f.filter(u=>(u.name||"").toLowerCase().includes(q)||(u.email||"").toLowerCase().includes(q));return f;}
function filterUsers(){renderUsers(getFiltered());}
function openModal(idx){selectedUser=getFiltered()[idx];if(!selectedUser)return;document.getElementById("modalSub").textContent="Personalized email for "+(selectedUser.name||selectedUser.email);document.getElementById("emailOutput").value="";document.getElementById("modalUserCard").innerHTML="<div><div class=\"modal-user-label\">Name</div><div class=\"modal-user-val\">"+esc(selectedUser.name||"-")+"</div></div><div><div class=\"modal-user-label\">Email</div><div class=\"modal-user-val\" style=\"font-size:11px\">"+esc(selectedUser.email)+"</div></div><div><div class=\"modal-user-label\">Tier</div><div class=\"modal-user-val\">"+(selectedUser.tier||"free")+"</div></div><div><div class=\"modal-user-label\">Signed Up</div><div class=\"modal-user-val\">"+fmt(selectedUser.signedUpAt)+"</div></div>";document.getElementById("emailModal").classList.add("open");}
function closeModal(){document.getElementById("emailModal").classList.remove("open");selectedUser=null;}
async function generateEmail(){if(!selectedUser)return;const btn=document.getElementById("generateBtn");const out=document.getElementById("emailOutput");const type=document.getElementById("emailType").value;const labels={checkin:"48-hour check-in",trial_ending:"trial ending soon",upgrade:"upgrade to Pro",winback:"win-back",voicedna:"Voice DNA intro",custom:"custom follow-up"};btn.disabled=true;btn.textContent="Generating...";out.value="";
try{const prompt="You are SAM, the AI creative director for SAM For Creators (samforcreators.com). Write a short, personal, warm follow-up email from Joey (the creator who built SAM) to this user.\n\nUser: "+(selectedUser.name||"there")+" | "+selectedUser.email+" | "+(selectedUser.tier||"free")+" tier | signed up "+fmt(selectedUser.signedUpAt)+" | source: "+(selectedUser.source||"app")+" | paid: "+(selectedUser.paid?"yes":"no")+"\n\nEmail type: "+(labels[type]||type)+"\n\nSAM brand voice: Direct, warm, creator-to-creator. Not corporate. Short paragraphs. Voice DNA is the key differentiator - SAM learns how they write and communicate. Sign off as Joey.\n\nWrite complete email with subject line. Format:\nSubject: [subject]\n\n[body]";
const r=await fetch("/api/generate-email",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({prompt})});
const data=await r.json();out.value=data.text||data.error||"Error generating.";}catch(e){out.value="Error: "+e.message;}
btn.disabled=false;btn.textContent="Regenerate";}
function copyEmail(){const text=document.getElementById("emailOutput").value;if(!text)return;navigator.clipboard.writeText(text).then(()=>{const btn=document.getElementById("copyBtn");btn.textContent="Copied!";setTimeout(()=>btn.textContent="Copy",2000);});}
function copyAddr(addr){navigator.clipboard.writeText(addr);}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function fmt(iso){if(!iso)return"-";try{return new Date(iso).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});}catch(e){return iso.split("T")[0];}}
document.getElementById("emailModal").addEventListener("click",function(e){if(e.target===this)closeModal();});
async function sendEmail(){
  if(!selectedUser||!selectedUser.email)return;
  const text=document.getElementById("emailOutput").value.trim();
  if(!text){alert("Generate an email first.");return;}
  
  // Parse subject from first line
  const lines=text.split("\n");
  let subject="Follow-up from Joey at SAM";
  let body=text;
  if(lines[0].toLowerCase().startsWith("subject:")){
    subject=lines[0].replace(/^subject:\s*/i,"").trim();
    body=lines.slice(1).join("\n").trim();
  }
  
  // Confirmation
  const confirmed=confirm("Send to: "+selectedUser.email+"\nSubject: "+subject+"\n\nConfirm send?");
  if(!confirmed)return;
  
  const btn=document.getElementById("sendBtn");
  btn.disabled=true;btn.textContent="Sending...";
  
  try{
    const r=await fetch("/api/waitlist",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        name:selectedUser.name||"there",
        email:selectedUser.email,
        source:"manual_followup",
        subject:subject,
        customBody:'<div style="font-family:Arial,sans-serif;padding:32px;background:#09080F;color:#F0ECFF;max-width:520px;margin:0 auto;border-radius:12px"><p style="white-space:pre-wrap;line-height:1.7;color:rgba(240,236,255,0.85)">'+body.replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>")+'</p><p style="color:rgba(240,236,255,0.3);font-size:12px;margin-top:24px">samforcreators.com &middot; Reply to unsubscribe</p></div>'
      })
    });
    const data=await r.json();
    if(data.success){
      btn.textContent="Sent!";
      btn.style.background="linear-gradient(135deg,#065f46,#34d399)";
      setTimeout(()=>{btn.disabled=false;btn.textContent="Send to User";},3000);
    } else {
      btn.textContent="Failed";btn.disabled=false;
    }
  }catch(e){
    btn.textContent="Error";btn.disabled=false;
    console.log("Send error:",e.message);
  }
}
loadUsers();
</script>
</body>
</html>
