<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Meet SAM — Strategic Assistant for Making</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <meta name="theme-color" content="#09080F" />
  <meta name="description" content="Meet SAM — the AI that learns your voice and builds your content strategy around your story." />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #09080F; --bg2: #0D0B16;
      --surface: rgba(255,255,255,0.04); --surface2: rgba(255,255,255,0.07);
      --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14);
      --text: #F0ECFF; --text2: rgba(240,236,255,0.65); --text3: rgba(240,236,255,0.38);
      --spark: #A78BFA; --pulse: #F472B6; --blueprint: #38BDF8;
      --radius: 14px; --radius-lg: 20px;

      /* ── QUIET STUDIO ── */
      --paper: #FAFAF7;
      --surface-2: #F4F2EC;
      --rule: #E5E2DB;
      --rule-strong: #C9C5BC;
      --ink: #1A1815;
      --ink-soft: #4A4640;
      --ink-muted: #8B8680;
      --ink-faint: #B8B4AB;
      --accent: #20808D;
      --accent-hover: #1A6A75;
      --accent-soft: rgba(32, 128, 141, 0.08);
      --serif-accent: #8B3A2F;
      --pos: #437A22;
      --neg: #A12C7B;
    }
    html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100dvh; overflow-x: hidden; -webkit-font-smoothing: antialiased; display: flex; flex-direction: column; }
    .orb { position: fixed; border-radius: 50%; filter: blur(90px); pointer-events: none; z-index: 0; }
    .orb-1 { width: 500px; height: 500px; background: #A78BFA; top: -150px; left: -120px; opacity: 0.15; }
    .orb-2 { width: 400px; height: 400px; background: #F472B6; bottom: 80px; right: -100px; opacity: 0.12; }
    .orb-3 { width: 300px; height: 300px; background: #38BDF8; top: 50%; left: 50%; transform: translate(-50%,-50%); opacity: 0.06; }
    nav { position: fixed; top: 0; left: 0; right: 0; height: 56px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 100; background: rgba(9,8,15,0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
    .nav-logo { font-family: 'Sora', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text); text-decoration: none; }
    .nav-logo span { color: var(--spark); }
    .nav-signin { font-size: 13px; font-weight: 500; color: var(--text3); background: none; border: 1px solid var(--border); border-radius: 999px; padding: 6px 16px; cursor: pointer; font-family: inherit; transition: all 0.2s; }
    .nav-signin:hover { color: var(--text); border-color: var(--border2); }
    .meet-container { flex: 1; display: flex; flex-direction: column; max-width: 600px; width: 100%; margin: 0 auto; padding: 72px 20px 32px; position: relative; z-index: 1; min-height: 100dvh; }
    .conversation { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 24px 0 16px; scroll-behavior: smooth; }
    .sam-bubble-wrap { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 24px; animation: fadeUp 0.5s cubic-bezier(0.34,1.2,0.64,1) forwards; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    .sam-avatar-wrap { position: relative; flex-shrink: 0; }
    .sam-avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg,#F472B6,#A78BFA); display: flex; align-items: center; justify-content: center; font-family: 'Sora',sans-serif; font-size: 14px; font-weight: 700; color: #09080F; flex-shrink: 0; position: relative; }
    .sam-avatar-ring { position: absolute; inset: -3px; border-radius: 50%; border: 1.5px solid rgba(167,139,250,0.6); opacity: 0; transition: opacity 0.3s; }
    .sam-avatar-wrap.speaking .sam-avatar-ring { opacity: 1; animation: ring-pulse 1.5s ease infinite; }
    @keyframes ring-pulse { 0%,100%{opacity:0.4;transform:scale(1);} 50%{opacity:1;transform:scale(1.05);} }
    .sam-bubble { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 4px 18px 18px 18px; padding: 14px 18px; font-size: 16px; line-height: 1.75; color: var(--text); max-width: calc(100% - 48px); word-wrap: break-word; }
    .sam-bubble.large { font-size: 18px; line-height: 1.8; background: rgba(167,139,250,0.05); border-color: rgba(167,139,250,0.15); }
    .user-bubble-wrap { display: flex; justify-content: flex-end; margin-bottom: 24px; animation: fadeUp 0.4s cubic-bezier(0.34,1.2,0.64,1) forwards; }
    .user-bubble { background: linear-gradient(135deg,rgba(56,189,248,0.12),rgba(167,139,250,0.08)); border: 1px solid rgba(56,189,248,0.2); border-radius: 18px 4px 18px 18px; padding: 13px 17px; font-size: 15px; line-height: 1.75; color: rgba(240,236,255,0.88); max-width: 80%; word-wrap: break-word; }
    .thinking-wrap { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 24px; }
    .thinking-bubble { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 4px 18px 18px 18px; padding: 14px 18px; display: flex; gap: 5px; align-items: center; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #A78BFA; animation: dot-bounce 1.2s ease infinite; }
    .dot:nth-child(2){animation-delay:0.2s;} .dot:nth-child(3){animation-delay:0.4s;}
    @keyframes dot-bounce { 0%,60%,100%{transform:translateY(0);opacity:0.4;} 30%{transform:translateY(-5px);opacity:1;} }
    .cursor { display: inline-block; width: 2px; height: 1em; background: #A78BFA; margin-left: 2px; vertical-align: middle; animation: blink 0.8s step-end infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .cta-wrap { padding: 8px 0 4px 48px; margin-bottom: 24px; animation: fadeUp 0.6s cubic-bezier(0.34,1.2,0.64,1) forwards; }
    .cta-btn { display: inline-flex; align-items: center; gap: 8px; padding: 14px 28px; background: linear-gradient(135deg,#6D28D9,#A78BFA 50%,#F472B6); border: none; border-radius: 50px; color: #fff; font-family: 'Sora',sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; box-shadow: 0 0 30px rgba(167,139,250,0.3); letter-spacing: 0.01em; transition: all 0.25s; }
    .cta-btn:hover { transform: translateY(-2px); box-shadow: 0 0 50px rgba(167,139,250,0.5); }
    .cta-sub { font-size: 11px; color: var(--text3); margin-top: 8px; letter-spacing: 0.04em; }
    .go-btn-wrap { padding: 4px 0 4px 0; margin-bottom: 24px; opacity: 0; transform: translateY(16px); transition: opacity 1.2s ease, transform 1.2s cubic-bezier(0.34,1.2,0.64,1); }
    .go-btn-wrap.revealed { opacity: 1; transform: translateY(0); }
    .go-btn { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 16px 32px; background: linear-gradient(135deg,#6D28D9,#A78BFA 50%,#F472B6); border: none; border-radius: 50px; color: #fff; font-family: 'Sora',sans-serif; font-size: 16px; font-weight: 700; cursor: pointer; box-shadow: 0 0 30px rgba(167,139,250,0.3); letter-spacing: 0.02em; transition: all 0.25s; width: 100%; }
    .go-btn:hover { transform: translateY(-2px); box-shadow: 0 0 50px rgba(167,139,250,0.5); }
    .voice-card { margin: 0 0 24px 48px; background: rgba(167,139,250,0.06); border: 1px solid rgba(167,139,250,0.2); border-radius: var(--radius-lg); padding: 20px; animation: fadeUp 0.5s cubic-bezier(0.34,1.2,0.64,1) forwards; }
    .voice-input { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid var(--border2); border-radius: var(--radius); padding: 14px 52px 14px 16px; font-family: 'Inter',sans-serif; font-size: 15px; color: var(--text); line-height: 1.6; resize: none; min-height: 100px; transition: all 0.2s; }
    .voice-input:focus { outline: none; border-color: rgba(167,139,250,0.5); background: rgba(255,255,255,0.06); }
    .voice-input::placeholder { color: var(--text3); }
    .voice-input-wrap { position: relative; }
    .voice-send-btn { position: absolute; bottom: 10px; right: 10px; width: 34px; height: 34px; border-radius: 8px; border: none; background: linear-gradient(135deg,#6D28D9,#A78BFA 50%,#F472B6); color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
    .voice-skip { font-size: 12px; color: var(--text3); background: none; border: none; cursor: pointer; font-family: inherit; padding: 8px 0 0; transition: color 0.2s; display: block; }
    .voice-skip:hover { color: var(--text2); }
    .input-row { display: flex; align-items: flex-end; gap: 10px; padding: 12px 0 0; border-top: 1px solid rgba(255,255,255,0.07); flex-shrink: 0; padding-bottom: env(safe-area-inset-bottom,0px); }
    .input-wrap { flex: 1; position: relative; }
    .main-input { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid var(--border2); border-radius: 16px; padding: 13px 52px 13px 18px; font-family: 'Inter',sans-serif; font-size: 16px; color: var(--text); line-height: 1.5; resize: none; min-height: 48px; max-height: 120px; overflow-y: auto; transition: all 0.2s; }
    .main-input:focus { outline: none; border-color: rgba(167,139,250,0.5); background: rgba(255,255,255,0.06); }
    .main-input::placeholder { color: var(--text3); }
    .send-btn { position: absolute; bottom: 8px; right: 8px; width: 32px; height: 32px; border-radius: 8px; border: none; background: linear-gradient(135deg,#6D28D9,#A78BFA 50%,#F472B6); color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; box-shadow: 0 0 16px rgba(167,139,250,0.4); }
    .send-btn:hover { transform: scale(1.05); }
    .signin-overlay { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(9,8,15,0.92); backdrop-filter: blur(16px); align-items: center; justify-content: center; padding: 20px; }
    .signin-overlay.open { display: flex; }
    .signin-card { background: rgba(13,11,22,0.98); border: 1px solid rgba(167,139,250,0.2); border-radius: 24px; padding: 32px; width: 100%; max-width: 400px; position: relative; }
    .signin-input { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid var(--border2); border-radius: var(--radius); padding: 14px 16px; font-family: 'Inter',sans-serif; font-size: 15px; color: var(--text); margin-bottom: 12px; transition: all 0.2s; }
    .signin-input:focus { outline: none; border-color: rgba(167,139,250,0.5); }
    .signin-input::placeholder { color: var(--text3); }
    .signin-btn { width: 100%; padding: 14px; background: linear-gradient(135deg,#6D28D9,#A78BFA 50%,#F472B6); border: none; border-radius: var(--radius); color: #fff; font-family: 'Sora',sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; margin-bottom: 12px; }
    .signin-close { position: absolute; top: 16px; right: 16px; background: none; border: none; color: var(--text3); font-size: 20px; cursor: pointer; padding: 4px; line-height: 1; }
    .signin-status { font-size: 13px; color: var(--spark); text-align: center; min-height: 20px; }
    .version-tag { position: fixed; bottom: 6px; left: 10px; color: rgba(255,255,255,0.15); font-size: 9px; font-weight: 600; letter-spacing: 0.08em; z-index: 9999; pointer-events: none; }
    @media (min-width: 768px) { nav { padding: 0 48px; } .meet-container { padding: 80px 32px 40px; } }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <nav>
    <a href="/" class="nav-logo">S.A.M<span>.</span></a>
    <button class="nav-signin" onclick="openSignIn()">Sign in</button>
  </nav>
  <div class="meet-container">
    <div class="conversation" id="conversation"></div>
    <div id="inputArea"></div>
  </div>
  <div class="signin-overlay" id="signinOverlay">
    <div class="signin-card">
      <button class="signin-close" onclick="closeSignIn()">&#x2715;</button>
      <div style="font-family:'Sora',sans-serif;font-size:20px;font-weight:700;color:var(--text);margin-bottom:8px;">Welcome back.</div>
      <div style="font-size:14px;color:var(--text2);margin-bottom:24px;line-height:1.6;">Enter your email and we'll send you a magic link to pick up right where you left off — on any device.</div>
      <input type="email" class="signin-input" id="signinEmail" placeholder="your@email.com" />
      <button class="signin-btn" onclick="sendMagicLink()">Send magic link &#x2192;</button>
      <div class="signin-status" id="signinStatus"></div>
    </div>
  </div>
  <div class="version-tag">v1.00</div>
<script>
const STATE = { uid:null, phase:'greeting', storyRaw:'', voiceProfile:null, samContext:null, name:null };

// Identity cache helpers — mirrored from app.html (shared module in future)
const _SAM_USER_KEY = 'sam-current-user';
const _SAM_CACHE_TTL = 300000;
function readUserCache() { try { return JSON.parse(localStorage.getItem(_SAM_USER_KEY) || 'null'); } catch { return null; } }
function writeUserCache(user) {
  try {
    localStorage.setItem(_SAM_USER_KEY, JSON.stringify({ ...user, _cachedAt: Date.now() }));
    localStorage.setItem('sam-trial', JSON.stringify({ email: user.email, name: user.name, tier: user.tier, paid: user.paid, trialStart: user.trialStart }));
  } catch {}
}
function getCurrentUserCached() { const c = readUserCache(); if (!c || !c._cachedAt || (Date.now() - c._cachedAt) >= _SAM_CACHE_TTL) return null; return c; }
function getCanonicalUid() { const u = getCurrentUserCached(); return (u && u.email) ? u.email.toLowerCase() : (STATE.uid || 'anon'); }

function getOrCreateUID() {
  let uid = localStorage.getItem('sam_uid');
  if (!uid) { uid = 'anon-' + Math.random().toString(36).slice(2) + Date.now().toString(36); localStorage.setItem('sam_uid', uid); }
  return uid.replace(/^dev-/, '');
}

function conv() { return document.getElementById('conversation'); }
function scrollBottom() { const c=conv(); setTimeout(()=>{ c.scrollTop=c.scrollHeight; },50); }
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px'; }

function addSAMBubble(large) {
  const wrap=document.createElement('div'); wrap.className='sam-bubble-wrap';
  wrap.innerHTML='<div class="sam-avatar-wrap speaking"><div class="sam-avatar-ring"></div><div class="sam-avatar">S</div></div><div class="sam-bubble'+(large?' large':'')+'"></div>';
  conv().appendChild(wrap); scrollBottom();
  return {wrap,bubble:wrap.querySelector('.sam-bubble'),avatarWrap:wrap.querySelector('.sam-avatar-wrap')};
}

function addUserBubble(text) {
  const wrap=document.createElement('div'); wrap.className='user-bubble-wrap';
  wrap.innerHTML='<div class="user-bubble">'+escHtml(text)+'</div>';
  conv().appendChild(wrap); scrollBottom();
}

function addThinking() {
  const wrap=document.createElement('div'); wrap.className='thinking-wrap'; wrap.id='thinkingWrap';
  wrap.innerHTML='<div class="sam-avatar-wrap speaking"><div class="sam-avatar-ring"></div><div class="sam-avatar">S</div></div><div class="thinking-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  conv().appendChild(wrap); scrollBottom();
}
function removeThinking() { const el=document.getElementById('thinkingWrap'); if(el) el.remove(); }

function showInputRow(ph) {
  ph = ph || 'Start anywhere \u2014 a moment, a feeling, something real...';
  document.getElementById('inputArea').innerHTML='<div class="input-row"><div class="input-wrap"><textarea class="main-input" id="mainInput" placeholder="'+ph+'" rows="1" onkeydown="if(event.key===\'Enter\'&&!event.shiftKey){event.preventDefault();handleSend();}" oninput="autoResize(this)"></textarea><button class="send-btn" onclick="handleSend()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button></div></div>';
  setTimeout(()=>{ const inp=document.getElementById('mainInput'); if(inp) inp.focus(); },300);
}

function showCTA() {
  document.getElementById('inputArea').innerHTML='<div class="cta-wrap"><button class="cta-btn" onclick="startTalking()">\u2746 Let\'s tell it together \u2192</button><div class="cta-sub">free \u00b7 no card \u00b7 7 days full access</div></div>';
}

function showGoButton(text) {
  text = text || '\u2746 Let\'s build your story \u2192';
  if(document.getElementById('goBtnWrap')) return;
  const wrap=document.createElement('div'); wrap.className='go-btn-wrap'; wrap.id='goBtnWrap';
  wrap.innerHTML='<button class="go-btn" onclick="handleGo()">'+text+'</button>';
  conv().appendChild(wrap); scrollBottom();
  setTimeout(()=>wrap.classList.add('revealed'),80);
}

function typewrite(el, text, onDone) {
  el.innerHTML=''; let i=0;
  const cur=document.createElement('span'); cur.className='cursor'; el.appendChild(cur);
  const tick=()=>{
    if(i<text.length){
      if(text[i]==='\n'){ el.insertBefore(document.createElement('br'),cur); }
      else { cur.insertAdjacentText('beforebegin',text[i]); }
      i++;
      const ch=text[i-1];
      const d=ch==='.'?480:ch===','?200:ch==='?'?440:ch==='!'?360:ch===' '?65:38;
      setTimeout(tick,d);
    } else { cur.remove(); if(onDone) onDone(); }
  };
  setTimeout(tick,300);
}

async function callSAM(messages, systemPrompt) {
  const payload={mode:'chat',userId:getCanonicalUid(),messages,systemPrompt,voiceProfile:STATE.voiceProfile||undefined,samContext:STATE.storyRaw?STATE.storyRaw.slice(0,800):undefined};
  try {
    const res=await fetch('/api/sam',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    const reader=res.body.getReader(); const decoder=new TextDecoder(); let fullText='';
    while(true){
      const{done,value}=await reader.read(); if(done) break;
      const chunk=decoder.decode(value,{stream:true});
      for(const line of chunk.split('\n')){
        if(!line.startsWith('data: ')) continue;
        try{ const evt=JSON.parse(line.slice(6).trim()); if(evt.done&&evt.result&&evt.result.reply) fullText=evt.result.reply; }catch(_){}
      }
    }
    return fullText;
  } catch(e){ return null; }
}

function startGreeting() {
  // Check for deep-link tool param
  const toolParam = new URLSearchParams(window.location.search).get('tool');
  const toolIntros = {
    pulse: "Let’s use The Pulse — tell me about a real moment from your life recently. Something you actually lived. The more specific, the better. I’ll turn it into a hook, full script, and captions.",
    spark: "The Spark is ready. Tell me your niche and the platform you post on most — I’ll give you 5 content ideas built specifically for you right now.",
    blueprint: "Blueprint mode. Tell me what you create and your main platform — I’ll plan your entire week of content in 30 seconds. Every day, every caption, ready to post.",
    vision: "The Vision — I’m going to give you one bold concept nobody else has made. Tell me your niche and what makes your story different from everyone else in your space.",
    lens: "The Lens is open. Are you here for thumbnail strategy or analytics decoding? Drop a photo or paste your analytics screenshot and I’ll tell you exactly what to do.",
    reach: "The Reach is ready. Drop a photo — any photo from your life or content — and I’ll turn it into a platform-ready post with caption and hashtags."
  };
  if (toolParam && toolIntros[toolParam]) {
    STATE.phase = 'talking';
    const avatarWrap = document.querySelector('.sam-avatar-wrap');
    if (avatarWrap) avatarWrap.classList.add('speaking');
    const bubble = addSAMBubble();
    typewrite(bubble, toolIntros[toolParam], () => {
      if (avatarWrap) avatarWrap.classList.remove('speaking');
      showInputRow('Tell SAM...');
    });
    return;
  }
  STATE.phase='greeting';
  const {bubble,avatarWrap}=addSAMBubble(true);
  const text='Everything amazing in life comes from stories. What\u2019s yours? Let\u2019s tell it.';
  typewrite(bubble,text,()=>{ avatarWrap.classList.remove('speaking'); setTimeout(showCTA,800); });
}

function startTalking() {
  STATE.phase='talking';
  document.getElementById('inputArea').innerHTML='';
  const {bubble,avatarWrap}=addSAMBubble();
  const text='Start anywhere. A moment, a struggle, something you\u2019ve been sitting on. Give me the messy version \u2014 talk to me like you\u2019re texting a friend. I\u2019ll find the content worth sharing inside it.';
  typewrite(bubble,text,()=>{ avatarWrap.classList.remove('speaking'); showInputRow(); });
}

async function handleSend() {
  const inp=document.getElementById('mainInput'); if(!inp) return;
  const text=inp.value.trim(); if(!text||text.length<3){ inp.focus(); return; }
  inp.value=''; inp.style.height='';
  addUserBubble(text);
  STATE.storyRaw+=(STATE.storyRaw?' ':'')+text;
  if(!STATE.name){ const nm=text.match(/(?:i'm|i am|my name is|call me)\s+([a-zA-Z]+)/i); if(nm) STATE.name=nm[1].charAt(0).toUpperCase()+nm[1].slice(1).toLowerCase(); }
  addThinking();
  const isFirst=(STATE.phase==='talking'||STATE.phase==='greeting');
  if(isFirst) STATE.phase='responded';
  const systemPrompt=isFirst
    ? 'You are SAM \u2014 a sharp creative director. A new user just shared something. Your ONLY job: give ONE gut-punch sentence that names the single most powerful or interesting thing about what they shared. No warmup. No questions. No bullet points. Just the observation \u2014 specific, direct, emotional. Then end with exactly: "Hit the button below and I will build your full content strategy around this story \u2014 in your voice, not AI." Two sentences total.'
    : 'You are SAM \u2014 a warm sharp creative director. Respond naturally in 2-3 sentences. Be specific. If they seem ready, encourage the button below.';
  const reply=await callSAM([{role:'user',content:text}],systemPrompt);
  removeThinking();
  const {bubble,avatarWrap}=addSAMBubble();
  const clean=(reply||'You\u2019ve got something real here. Hit the button below and let\u2019s build it.').replace(/\[NAV:[^\]]+\]/g,'').trim();
  typewrite(bubble,clean,()=>{ avatarWrap.classList.remove('speaking'); setTimeout(()=>showGoButton(),800); });
}

function handleGo() {
  const gw=document.getElementById('goBtnWrap'); if(gw) gw.style.display='none';
  document.getElementById('inputArea').innerHTML='';
  if(STATE.voiceProfile){ showHandoff(); return; }
  showVoiceDNA();
}

function showVoiceDNA() {
  STATE.phase='voice_dna';
  const inputArea=document.getElementById('inputArea'); if(inputArea) inputArea.innerHTML='';
  const card=document.createElement('div'); card.className='voice-card'; card.id='voiceCard';
  card.innerHTML='<div style="font-size:10px;font-weight:800;letter-spacing:0.14em;text-transform:uppercase;color:rgba(167,139,250,0.7);margin-bottom:8px;">\u2746 ONE MORE THING</div><div style="font-family:\'Sora\',sans-serif;font-size:15px;font-weight:700;color:var(--text);margin-bottom:4px;">I want to sound like <span style="color:#A78BFA;text-decoration:underline;text-underline-offset:3px;">you</span> \u2014 not like AI.</div><div style="font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:14px;">Give me a few sentences. Don\u2019t think about it \u2014 just type how you actually talk. The messier the better.</div><div class="voice-input-wrap"><textarea class="voice-input" id="voiceInput" placeholder="Catch me up like I\u2019m your friend who\u2019s been off the grid for a month. What\u2019s the thing you can\u2019t stop thinking about?" rows="3"></textarea><button class="voice-send-btn" onclick="submitVoice()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button></div><button class="voice-skip" onclick="skipVoice()">Skip for now \u2192</button>';
  conv().appendChild(card); scrollBottom();
  setTimeout(()=>{ const vi=document.getElementById('voiceInput'); if(vi) vi.focus(); },300);
}

async function submitVoice() {
  const inp=document.getElementById('voiceInput'); const val=inp?inp.value.trim():'';
  if(!val||val.length<10){ if(inp) inp.style.borderColor='rgba(244,114,182,0.5)'; return; }
  const card=document.getElementById('voiceCard');
  if(card) card.innerHTML='<div style="display:flex;gap:8px;align-items:center;padding:8px 0;"><div class="dot"></div><div class="dot"></div><div class="dot"></div><span style="font-size:13px;color:var(--text3);margin-left:6px;">Reading how you write...</span></div>';
  const systemPrompt='You are SAM \u2014 a voice fingerprinting engine. Read this writing sample and extract the person\u2019s exact voice DNA. Return EXACTLY this format \u2014 nothing else:\n\n**VOICE DNA EXTRACTED:**\n1. [trait \u2014 max 14 words, brutally specific]\n2. [trait]\n3. [trait]\n4. [trait]\n5. [trait]\n6. [trait]\n7. [trait]\n8. [trait]\n\nThen: "I\u2019ve got you \u2014 everything I build is going to sound like YOU wrote it, not a robot."';
  const reply=await callSAM([{role:'user',content:val}],systemPrompt);
  const profile=reply||'Direct, real, no fluff. Talks like texting a friend.';
  STATE.voiceProfile=profile;
  localStorage.setItem('sam-voice-profile',JSON.stringify({raw:profile}));
  localStorage.setItem('sam-voice-calibrated','true');
  // Send real writing samples to Voice DNA engine — actual words, not just traits
  if(STATE.uid){
    const realSamples=[val,STATE.storyRaw].filter(s=>s&&s.length>10);
    fetch('/api/voice',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:getCanonicalUid(),samples:realSamples,existingProfile:{voice_profile:profile}})}).catch(()=>{});
  }
  if(STATE.uid) fetch('/api/sam',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mode:'chat',userId:getCanonicalUid(),messages:[],voiceProfile:profile,samContext:STATE.storyRaw.slice(0,800),name:STATE.name||undefined,niche:STATE.niche||undefined})}).catch(()=>{});
  showEmailCapture(profile,card);
}

function showEmailCapture(profile, card) {
  if(card) card.innerHTML='<div style="background:linear-gradient(135deg,rgba(167,139,250,0.08),rgba(56,189,248,0.04));border:1px solid rgba(167,139,250,0.2);border-radius:12px;padding:16px;"><div style="font-size:10px;font-weight:800;letter-spacing:0.14em;text-transform:uppercase;background:linear-gradient(90deg,#A78BFA,#38BDF8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px;">✦ Your Voice DNA is ready</div><div style="font-size:13px;color:rgba(240,236,255,0.85);margin-bottom:12px;">Drop your email so SAM remembers you next session — your Voice DNA grows every time you come back.</div><div style="display:flex;gap:8px;margin-bottom:8px;"><input id="nameCapture" type="text" placeholder="First name" style="width:120px;background:rgba(255,255,255,0.05);border:1px solid rgba(167,139,250,0.3);border-radius:8px;padding:8px 12px;color:#fff;font-size:13px;outline:none;" /><input id="emailCapture" type="email" placeholder="your@email.com" style="flex:1;background:rgba(255,255,255,0.05);border:1px solid rgba(167,139,250,0.3);border-radius:8px;padding:8px 12px;color:#fff;font-size:13px;outline:none;" /><button onclick="saveEmail()" style="background:linear-gradient(90deg,#A78BFA,#38BDF8);border:none;border-radius:8px;padding:8px 16px;color:#000;font-weight:700;font-size:13px;cursor:pointer;">Save</button></div><button onclick="skipEmail()" style="background:none;border:none;color:rgba(255,255,255,0.3);font-size:11px;cursor:pointer;padding:4px 0;">Skip for now →</button></div>';
  setTimeout(prefillEmailCapture, 100);
  window._pendingProfile = profile;
  window._pendingCard = card;
}

function getSamUserCookie() {
  try {
    const match = document.cookie.split(';').map(c=>c.trim()).find(c=>c.startsWith('sam_user='));
    if (!match) return null;
    return JSON.parse(decodeURIComponent(match.split('=').slice(1).join('=')));
  } catch(e) { return null; }
}

function prefillEmailCapture() {
  const user = getSamUserCookie();
  const storedEmail = localStorage.getItem('sam_user_email');
  const storedName = localStorage.getItem('sam_meet_name');
  const email = user?.email || storedEmail || '';
  const name = user?.name || storedName || STATE.name || '';
  const nameEl = document.getElementById('nameCapture');
  const emailEl = document.getElementById('emailCapture');
  if (nameEl && name) nameEl.value = name;
  if (emailEl && email) emailEl.value = email;
  // If we already have email from welcome flow — auto-save silently
  if (email && email.includes('@')) {
    setTimeout(() => {
      const currentEmail = document.getElementById('emailCapture')?.value?.trim();
      if (currentEmail && currentEmail.includes('@')) saveEmail(true);
    }, 500);
  }
}

async function saveEmail(silent) {
  const email = document.getElementById('emailCapture')?.value?.trim();
  const firstName = document.getElementById('nameCapture')?.value?.trim() || STATE.name || undefined;
  if(!email || !email.includes('@')) { document.getElementById('emailCapture').style.borderColor='rgba(244,114,182,0.5)'; return; }
  if(firstName) STATE.name = firstName;
  const alreadySaved = localStorage.getItem('sam_user_email') === email.toLowerCase();
  localStorage.setItem('sam_user_email', email);

  // Write canonical cache with safe merge — avoid clobbering paid status
  const _lowEmail = email.toLowerCase();
  const _ex = getCurrentUserCached();
  let _cacheWrite;
  if (_ex && _ex.email === _lowEmail) {
    // Same user already cached — keep tier/paid/trialStart, refresh name if newly captured
    _cacheWrite = { ..._ex, name: firstName || _ex.name || '' };
  } else if (_ex && _ex.email && _ex.email !== _lowEmail) {
    // Different user in cache — write fresh free record for new email
    _cacheWrite = { email: _lowEmail, name: firstName || '', tier: 'free', paid: false, trialStart: Date.now() };
  } else {
    // No cache — fetch canonical from /api/me before writing to avoid clobbering paid status
    try {
      const _r = await fetch('/api/me', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email: _lowEmail }) });
      const _d = await _r.json();
      _cacheWrite = (_d && _d.user)
        ? { ..._d.user, name: firstName || _d.user.name || '' }
        : { email: _lowEmail, name: firstName || '', tier: 'free', paid: false, trialStart: Date.now() };
    } catch {
      _cacheWrite = { email: _lowEmail, name: firstName || '', tier: 'free', paid: false, trialStart: Date.now() };
    }
  }
  writeUserCache(_cacheWrite);
  const _nb = document.querySelector('.nav-signin');
  if (_nb) { _nb.textContent = '✓ ' + (firstName || email.split('@')[0]); _nb.style.borderColor = 'rgba(52,211,153,0.4)'; _nb.style.color = '#34D399'; _nb.onclick = null; }

  // Only call API if not already saved from welcome flow
  if(!alreadySaved && STATE.uid) {
    fetch('/api/sam',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mode:'chat',userId:getCanonicalUid(),messages:[],email:email,name:firstName,voiceProfile:window._pendingProfile,samContext:STATE.storyRaw?.slice(0,800)})}).catch(()=>{});
  }
  if(!silent) showVoiceLocked(window._pendingProfile, window._pendingCard);
  else if(window._pendingProfile && window._pendingCard) showVoiceLocked(window._pendingProfile, window._pendingCard);
}

function skipEmail() {
  showVoiceLocked(window._pendingProfile, window._pendingCard);
}

function showVoiceLocked(profile,card) {
  const lines=profile.split('\n').filter(l=>l.match(/^\d+\./));
  const traitsHtml=lines.map((l,i)=>'<div style="display:flex;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.04);"><div style="font-size:10px;font-weight:800;color:#A78BFA;opacity:0.5;padding-top:2px;min-width:20px;">0'+(i+1)+'</div><div style="font-size:13px;line-height:1.6;color:rgba(240,236,255,0.85);">'+escHtml(l.replace(/^\d+\.\s*/,''))+'</div></div>').join('');
  if(card) card.innerHTML='<div style="background:linear-gradient(135deg,rgba(167,139,250,0.08),rgba(56,189,248,0.04));border:1px solid rgba(167,139,250,0.2);border-radius:12px;padding:16px;"><div style="font-size:10px;font-weight:800;letter-spacing:0.14em;text-transform:uppercase;background:linear-gradient(90deg,#A78BFA,#38BDF8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:12px;">\u2746 Voice DNA Extracted</div>'+traitsHtml+'<div style="font-size:13px;color:var(--text3);padding-top:10px;border-top:1px solid rgba(255,255,255,0.06);margin-top:4px;">I\u2019ve got you \u2014 everything I build is going to sound like YOU wrote it, not a robot.</div></div>';
  setTimeout(()=>showHandoff(),1000);
  scrollBottom();
}

function skipVoice() { const c=document.getElementById('voiceCard'); if(c) c.remove(); showHandoff(); }

function showHandoff() {
  STATE.phase='handoff';
  const gw=document.getElementById('goBtnWrap'); if(gw) gw.style.display='none';
  const card=document.createElement('div');
  card.style.cssText='background:rgba(167,139,250,0.06);border:1px solid rgba(167,139,250,0.15);border-radius:18px;padding:24px;margin-bottom:24px;animation:fadeUp 0.5s cubic-bezier(0.34,1.2,0.64,1) forwards;';
  const voiceLine=STATE.voiceProfile?'<div style="display:flex;align-items:center;gap:8px;background:rgba(52,211,153,0.08);border:1px solid rgba(52,211,153,0.2);border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:13px;color:rgba(240,236,255,0.7);">&#127897; <span>Voice locked in \u2014 everything SAM builds will sound like <strong style="color:#34D399;">you</strong>, not AI.</span></div>':'';
  card.innerHTML='<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;"><div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#F472B6,#A78BFA);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#09080F;flex-shrink:0;font-family:\'Sora\',sans-serif;">S</div><div><div style="font-size:13px;font-weight:600;color:#F0ECFF;">SAM</div><div style="font-size:11px;color:var(--text3);">Your creative director</div></div><div style="margin-left:auto;width:7px;height:7px;border-radius:50%;background:#34D399;flex-shrink:0;"></div></div>'+voiceLine+'<div style="font-size:16px;line-height:1.7;color:rgba(240,236,255,0.9);margin-bottom:12px;">Here\u2019s what happens next.</div><div style="font-size:15px;line-height:1.8;color:var(--text2);margin-bottom:20px;">I\u2019m going to ask you <strong style="color:#F0ECFF;">12 quick questions</strong> \u2014 takes about 3 minutes. By the end, you\u2019ll have a complete content playbook built around your story.</div><button onclick="goToWizard()" style="width:100%;padding:16px;border-radius:999px;background:linear-gradient(90deg,#F472B6,#A78BFA,#38BDF8);border:none;color:#09080F;font-size:15px;font-weight:700;cursor:pointer;font-family:\'Sora\',sans-serif;">\u2746 I\u2019m ready \u2014 let\u2019s build \u2192</button><div style="text-align:center;margin-top:10px;font-size:12px;color:var(--text3);">No card needed \u00b7 Cancel anytime</div>';
  conv().appendChild(card); scrollBottom();
}

function goToWizard() {
  localStorage.setItem('samFirstRunDone','1');
  document.cookie = 'sam_visited=true; expires=' + new Date(Date.now() + 365*24*60*60*1000).toUTCString() + '; path=/; SameSite=Lax';
  if(STATE.name) localStorage.setItem('sam_meet_name',STATE.name);
  if(STATE.storyRaw) localStorage.setItem('sam_meet_story',STATE.storyRaw.slice(0,2000));
  if(STATE.voiceProfile){ localStorage.setItem('sam-voice-profile',JSON.stringify({raw:STATE.voiceProfile})); localStorage.setItem('sam-voice-calibrated','true'); }
  window.location.href='/app?launch=wizard';
}

function showReturningUser(profile) {
  // Check for deep-link tool param — takes priority over returning user flow
  const toolParam = new URLSearchParams(window.location.search).get('tool');
  const toolIntros = {
    pulse: "Let’s use The Pulse — tell me about a real moment from your life recently. Something you actually lived. The more specific, the better. I’ll turn it into a hook, full script, and captions.",
    spark: "The Spark is ready. Tell me your niche and the platform you post on most — I’ll give you 5 content ideas built specifically for you right now.",
    blueprint: "Blueprint mode. Tell me what you create and your main platform — I’ll plan your entire week of content in 30 seconds. Every day, every caption, ready to post.",
    vision: "The Vision — I’m going to give you one bold concept nobody else has made. Tell me your niche and what makes your story different from everyone else in your space.",
    lens: "The Lens is open. Are you here for thumbnail strategy or analytics decoding? Drop a photo or paste your analytics screenshot and I’ll tell you exactly what to do.",
    reach: "The Reach is ready. Drop a photo — any photo from your life or content — and I’ll turn it into a platform-ready post with caption and hashtags."
  };
  if (toolParam && toolIntros[toolParam]) {
    STATE.phase = 'talking';
    const avatarWrap = document.querySelector('.sam-avatar-wrap');
    if (avatarWrap) avatarWrap.classList.add('speaking');
    const bubble = addSAMBubble();
    typewrite(bubble, toolIntros[toolParam], () => {
      if (avatarWrap) avatarWrap.classList.remove('speaking');
      showInputRow('Tell SAM...');
    });
    return;
  }
  STATE.phase='returning';
  profile=profile||{};
  const name=profile.name||STATE.name||null;
  if(profile.voice_profile){ STATE.voiceProfile=profile.voice_profile; localStorage.setItem('sam-voice-profile',JSON.stringify({raw:profile.voice_profile})); }
  const card=document.createElement('div');
  card.style.cssText='background:rgba(167,139,250,0.06);border:1px solid rgba(167,139,250,0.15);border-radius:18px;padding:24px;margin-bottom:24px;';
  const greeting=name?'Hey '+name+' \u2014 welcome back.':'Hey \u2014 welcome back.';
  card.innerHTML='<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;"><div style="width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#F472B6,#A78BFA);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#09080F;flex-shrink:0;font-family:\'Sora\',sans-serif;">S</div><div><div style="font-size:13px;font-weight:500;color:#F0ECFF;">SAM</div><div style="font-size:11px;color:var(--text3);">Your creative director</div></div><div style="margin-left:auto;width:7px;height:7px;border-radius:50%;background:#34D399;flex-shrink:0;"></div></div><div style="font-size:15px;line-height:1.7;color:rgba(240,236,255,0.85);margin-bottom:16px;">'+greeting+'</div><div style="display:flex;gap:10px;flex-wrap:wrap;"><button onclick="window.location.href=\'/?workshop=1\'" style="display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border-radius:999px;font-size:14px;font-weight:700;cursor:pointer;border:none;background:linear-gradient(135deg,#A78BFA,#F472B6);color:#09080F;font-family:\'Sora\',sans-serif;">Open Workshop</button><button onclick="startTalkingReturning()" style="display:inline-flex;align-items:center;gap:8px;padding:11px 20px;border-radius:999px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:var(--surface);color:var(--text2);font-family:inherit;">Talk with SAM</button></div>';
  conv().appendChild(card); scrollBottom();
}

function startTalkingReturning() {
  const cards=conv().querySelectorAll('div[style*="border-radius:18px"]');
  cards.forEach(c=>{ c.style.opacity='0'; setTimeout(()=>c.remove(),400); });
  setTimeout(()=>{ STATE.phase='responded'; showInputRow('Ask SAM anything...'); },450);
}

function openSignIn() { document.getElementById('signinOverlay').classList.add('open'); }
function closeSignIn() { document.getElementById('signinOverlay').classList.remove('open'); }
async function sendMagicLink() {
  const email = document.getElementById('signinEmail').value.trim();
  const status = document.getElementById('signinStatus');
  const btn = document.querySelector('.signin-btn');
  if (!email || !email.includes('@')) { status.textContent = 'Please enter a valid email.'; return; }
  status.textContent = 'Sending...';
  if (btn) btn.disabled = true;
  try {
    const r = await fetch('/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'send_magic_link', email })
    });
    const data = await r.json();
    if (data.success) {
      status.textContent = '✓ Check your email for the sign-in link.';
    } else {
      status.textContent = 'Something went wrong. Try again.';
      if (btn) btn.disabled = false;
    }
  } catch(e) {
    status.textContent = 'Connection error. Try again.';
    if (btn) btn.disabled = false;
  }
}

async function init() {
  STATE.uid=getOrCreateUID();
  const firstRunDone=localStorage.getItem('samFirstRunDone');
  const hasSession=localStorage.getItem('sam_session_v2');
  const cachedVoice=localStorage.getItem('sam-voice-profile');
  if(cachedVoice){ try{ STATE.voiceProfile=JSON.parse(cachedVoice).raw||null; }catch(e){} }
  const initToolParam = new URLSearchParams(window.location.search).get('tool');

  // Paint nav with canonical identity if cached
  const _cu = getCurrentUserCached();
  const _navBtn = document.querySelector('.nav-signin');
  if (_cu && _cu.email && _navBtn) {
    const _dn = _cu.name ? _cu.name : _cu.email.split('@')[0];
    _navBtn.textContent = '✓ ' + _dn;
    _navBtn.style.borderColor = 'rgba(52,211,153,0.4)';
    _navBtn.style.color = '#34D399';
    _navBtn.onclick = null;
  }

  if(firstRunDone||hasSession){
    const _name = (_cu && _cu.name) || localStorage.getItem('sam_meet_name') || null;
    const _voice = (_cu && _cu.voiceProfile) || STATE.voiceProfile;
    showReturningUser({name:_name,voice_profile:_voice});
  } else {
    startGreeting();
  }
}

document.addEventListener('DOMContentLoaded',init);
</script>
